<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Lead Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    font-family: 'Inter', sans-serif;
    padding: 18px 18px;
    color: #1a2340;
  }

  .container { width: 100%; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .header h1 {
    font-size: 0.88rem;
    font-weight: 700;
    color: #1a2340;
  }

  .header p {
    font-size: 0.65rem;
    color: #8a94a6;
    margin-top: 1px;
    font-weight: 500;
  }

  .refresh-btn {
    background: #f4f6f9;
    border: 1px solid #e2e6ed;
    color: #4a7bde;
    padding: 5px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .refresh-btn:hover {
    background: #eaf0ff;
    border-color: #4a7bde;
  }

  /* Column headers */
  .col-headers {
    display: grid;
    grid-template-columns: 1fr 80px 80px;
    padding: 0 10px 6px 10px;
    gap: 8px;
  }
  .col-headers span {
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #8a94a6;
  }
  .col-headers span:not(:first-child) { text-align: center; }

  .agent-list { display: flex; flex-direction: column; gap: 5px; }

  .agent-row {
    background: #f7f9fc;
    border: 1px solid #eaeef4;
    border-radius: 8px;
    padding: 10px 12px;
    display: grid;
    grid-template-columns: 1fr 80px 80px;
    align-items: center;
    gap: 8px;
    animation: rowIn 0.35s ease both;
    transition: box-shadow 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .agent-row:hover {
    box-shadow: 0 2px 10px rgba(74,123,222,0.08);
    border-color: #c8d8f8;
    background: #f0f5ff;
  }

  @keyframes rowIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .agent-name {
    font-size: 0.82rem;
    font-weight: 600;
    color: #1a2340;
  }

  .stat { text-align: center; }
  .stat-value {
    font-size: 1.1rem;
    font-weight: 800;
    color: #1a2340;
    line-height: 1;
  }
  .stat-value.remaining { color: #4a7bde; }

  /* Progress bar */
  .progress-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: #eaeef4;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4a7bde, #63b3ed);
  }

  .loading, .empty {
    text-align: center;
    padding: 30px 20px;
    color: #8a94a6;
    font-size: 0.78rem;
    font-weight: 500;
    background: #f7f9fc;
    border-radius: 8px;
    border: 1px solid #eaeef4;
  }

  .last-updated {
    text-align: right;
    margin-top: 8px;
    color: #b0b8c8;
    font-size: 0.6rem;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Agent Lead Tracker</h1>
      <p>Active agents only</p>
    </div>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>

  <div class="col-headers">
    <span>Agent Name</span>
    <span>Ordered</span>
    <span>Remaining</span>
  </div>

  <div id="content"><div class="loading">Loading...</div></div>
  <div class="last-updated" id="ts"></div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSkAcnwylBOMPPqlyXP1bWlPUgYopcfiCQQKXiokjFTwf6-oaZejVYhei3i92JhhChdMX_XtuUQ3ip-/pub?gid=1546159927&single=true&output=csv';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
  return lines.slice(1).map(line => {
    const cols=[]; let cur='', q=false;
    for(let c of line){
      if(c==='"') q=!q;
      else if(c===','&&!q){cols.push(cur.trim());cur='';}
      else cur+=c;
    }
    cols.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=(cols[i]||'').replace(/"/g,''));
    return obj;
  }).filter(r => r['Agent Name'] && (r['Active']||'').toLowerCase()==='yes');
}

async function loadData() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const res = await fetch(CSV_URL);
    if(!res.ok) throw new Error();
    const agents = parseCSV(await res.text());
    if(!agents.length){ el.innerHTML='<div class="empty">No active agents</div>'; return; }

    const list = document.createElement('div');
    list.className = 'agent-list';

    agents.forEach((a,i)=>{
      const ordered   = parseInt(a['Order Qty']||0)||0;
      const remaining = parseInt(a['Remaining']||0)||0;
      const pct       = ordered>0 ? Math.round((remaining/ordered)*100) : 0;
      const row = document.createElement('div');
      row.className = 'agent-row';
      row.style.animationDelay = (i*0.05)+'s';
      row.innerHTML = `
        <div class="agent-name">${a['Agent Name']}</div>
        <div class="stat"><div class="stat-value">${ordered}</div></div>
        <div class="stat"><div class="stat-value remaining">${remaining}</div></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      `;
      list.appendChild(row);
    });

    el.innerHTML='';
    el.appendChild(list);
    document.getElementById('ts').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    el.innerHTML='<div class="empty">⚠ Could not load data</div>';
  }
}

loadData();
setInterval(loadData, 5*60*1000);
</script>
</body>
</html>
